dataset:
  name: yambda
  interactions_path: data/raw/yambda_interactions.parquet
  item_embeddings_path: data/raw/yambda_item_embeddings.parquet
  output_dir: data/processed/yambda
  column_map:
    user_id: user_id
    item_id: item_id
    timestamp: timestamp
    target: target
    event_type: event_type
  filters:
    min_user_interactions: 3
    min_item_interactions: 1
  split:
    train_ratio: 0.8
    validation_ratio: 0.1
    test_ratio: 0.1
  sequence:
    max_length: 50
    min_length: 2
  negative_sampling:
    num_negatives: 50
    seed: 7

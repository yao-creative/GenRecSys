dataset:
  name: amazon_sports
  normalizer: generic
  external_dir: data/external/amazon_sports
  raw_interactions_path: data/raw/amazon_sports_interactions.parquet
  raw_items_path: data/raw/amazon_sports_items.parquet
  download:
    mode: manual
    manual_instructions: >-
      Download the Amazon Reviews'23 Sports_and_Outdoors review and metadata files
      from the official release, place them under data/external/amazon_sports/,
      and keep the filenames below.
  sources:
    reviews: Sports_and_Outdoors.csv.gz
    meta: meta_Sports_and_Outdoors.jsonl.gz
  normalization:
    interactions:
      source: reviews
      user_id: user_id
      item_id: parent_asin
      timestamp: timestamp
      event_type: review
      extra_columns:
        - rating
        - verified_purchase
    items:
      source: meta
      item_id: parent_asin
      extra_columns:
        title: title
        main_category: main_category
        categories: categories
        average_rating: average_rating
        rating_number: rating_number
        store: store
        price: price

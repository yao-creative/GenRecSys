stages:
  acquire_movielens25m:
    cmd: >-
      uv run python -m recsys_gen.training.acquire --config configs/acquire_movielens25m.yaml
    deps:
      - configs/acquire_movielens25m.yaml
      - src/recsys_gen/data/acquisition.py
      - src/recsys_gen/training/acquire.py
      - src/recsys_gen/utils/io.py
    outs:
      - data/raw/movielens25m_interactions.parquet
      - data/raw/movielens25m_items.parquet

  acquire_amazon_electronics:
    cmd: >-
      uv run python -m recsys_gen.training.acquire --config configs/acquire_amazon_electronics.yaml

    outs:
      - data/processed/yambda/train.parquet
      - data/processed/yambda/validation.parquet
      - data/processed/yambda/test.parquet
      - data/processed/yambda/user_vocab.parquet
      - data/processed/yambda/item_vocab.parquet
      - data/processed/yambda/train_encoded.parquet
      - data/processed/yambda/validation_encoded.parquet
      - data/processed/yambda/test_encoded.parquet
      - data/processed/yambda/retrieval_train.parquet
      - data/processed/yambda/retrieval_validation.parquet
      - data/processed/yambda/retrieval_test.parquet
      - data/processed/yambda/seen_train.parquet


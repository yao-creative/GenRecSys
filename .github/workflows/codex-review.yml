name: Codex Azure Review

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to review (for manual runs)"
        required: false
        type: string
      base_ref:
        description: "Optional base ref/sha for manual diff (default: HEAD~1)"
        required: false
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@codex')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex'))
    runs-on: ubuntu-latest
    env:
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
      AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: Build diff for review
        id: diff
        shell: bash
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"
          PR_NUMBER_INPUT="${{ inputs.pr_number || '' }}"
          BASE_INPUT="${{ inputs.base_ref || '' }}"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            PR_NUMBER="${{ github.event.issue.number }}"
            gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" > pr.json
            BASE_SHA="$(jq -r '.base.sha' pr.json)"
            HEAD_SHA="$(jq -r '.head.sha' pr.json)"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            PR_URL="${{ github.event.pull_request.url }}"
            gh api "$PR_URL" > pr.json
            BASE_SHA="$(jq -r '.base.sha' pr.json)"
            HEAD_SHA="$(jq -r '.head.sha' pr.json)"
            PR_NUMBER="$(jq -r '.number' pr.json)"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            if [[ -n "$PR_NUMBER_INPUT" ]]; then
              gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER_INPUT" > pr.json
              BASE_SHA="$(jq -r '.base.sha' pr.json)"
              HEAD_SHA="$(jq -r '.head.sha' pr.json)"
              echo "pr_number=$PR_NUMBER_INPUT" >> "$GITHUB_OUTPUT"
            else
              BASE_SHA="${BASE_INPUT:-HEAD~1}"
              HEAD_SHA="${{ github.sha }}"
            fi
          fi

          if [[ "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="HEAD~1"
          fi

          git diff --no-color "$BASE_SHA" "$HEAD_SHA" > diff.patch || true
          BYTES=$(wc -c < diff.patch)
          echo "diff_bytes=$BYTES" >> "$GITHUB_OUTPUT"

      - name: Run Codex review (Azure OpenAI)
        if: steps.diff.outputs.diff_bytes != '0'
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from openai import AzureOpenAI

          diff = Path("diff.patch").read_text(encoding="utf-8", errors="ignore")
          diff = diff[:120000]

          endpoint = os.environ.get("AZURE_OPENAI_ENDPOINT", "").rstrip("/")
          api_key = os.environ.get("AZURE_OPENAI_API_KEY", "")
          deployment = os.environ.get("AZURE_OPENAI_DEPLOYMENT", "")
          api_version = os.environ.get("AZURE_OPENAI_API_VERSION") or "2024-02-01"

          if not endpoint or not api_key or not deployment:
            raise SystemExit("Missing one or more required secrets: AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_KEY, AZURE_OPENAI_DEPLOYMENT")

          client = AzureOpenAI(
            azure_endpoint=endpoint,
            api_key=api_key,
            api_version=api_version,
          )

          system_prompt = (
            "You are Codex performing strict code review. Prioritize: correctness bugs, behavioral regressions, "
            "schema-contract risks, performance regressions, and missing tests. "
            "Format with sections: Findings (high->low), Open Questions, Suggested Tests."
          )

          user_prompt = "Review the following git diff:\n\n" + diff

          resp = client.chat.completions.create(
            model=deployment,
            temperature=0,
            messages=[
              {"role": "system", "content": system_prompt},
              {"role": "user", "content": user_prompt},
            ],
          )

          review = resp.choices[0].message.content or "No review output returned."
          Path("review.md").write_text(review, encoding="utf-8")
          print(review)
          PY

      - name: Diff empty summary
        if: steps.diff.outputs.diff_bytes == '0'
        run: echo "No diff to review." > review.md

      - name: Publish job summary
        run: |
          {
            echo "## Codex Azure Review"
            echo
            cat review.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: github.event_name == 'pull_request' || steps.diff.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          PR_NUMBER="${{ steps.diff.outputs.pr_number || github.event.pull_request.number }}"
          BODY_FILE=review-comment.md
          {
            echo "### Codex Azure Review"
            echo
            cat review.md
          } > "$BODY_FILE"
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body-file "$BODY_FILE"
